openapi: 3.0.3
info:
  title: News Deframer Web API
  version: 1.0.0
servers:
  - url: /
security:
  - basicAuth: []
tags:
  - name: web
paths:
  /api/domains:
    get:
      tags: [web]
      operationId: getDomains
      responses:
        "200":
          description: Domain list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomainEntry"
  /api/item:
    get:
      tags: [web]
      operationId: getItem
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Analyzed item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzedItem"
  /api/site:
    get:
      tags: [web]
      operationId: getSite
      parameters:
        - name: root
          in: query
          required: true
          schema:
            type: string
        - name: max_score
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Site items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalyzedSiteItem"
  /api/trends/topbydomain:
    get:
      tags: [web]
      operationId: getTopTrendByDomain
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Trend metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendMetric"
  /api/trends/contextbydomain:
    get:
      tags: [web]
      operationId: getContextByDomain
      parameters:
        - name: term
          in: query
          required: true
          schema:
            type: string
        - name: domain
          in: query
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Trend context
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendContext"
  /api/trends/lifecyclebydomain:
    get:
      tags: [web]
      operationId: getLifecycleByDomain
      parameters:
        - name: term
          in: query
          required: true
          schema:
            type: string
        - name: domain
          in: query
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Lifecycle samples
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lifecycle"
  /api/trends/comparedomains:
    get:
      tags: [web]
      operationId: getDomainComparison
      parameters:
        - name: domain_a
          in: query
          required: true
          schema:
            type: string
        - name: domain_b
          in: query
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Domain comparison rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomainComparison"
  /api/articles:
    get:
      tags: [web]
      operationId: getArticlesByTrend
      parameters:
        - name: root
          in: query
          required: true
          schema:
            type: string
        - name: term
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date-time
        - name: days
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Article summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalyzedArticle"
  /api/sentiments:
    get:
      tags: [web]
      operationId: getSentimentsByTrend
      parameters:
        - name: root
          in: query
          required: true
          schema:
            type: string
        - name: term
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date-time
        - name: days
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Sentiment pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentimentItem"
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    DomainEntry:
      type: object
      required: [domain, language]
      properties:
        domain:
          type: string
        language:
          type: string
        portal_url:
          type: string
          format: uri
    TrendMetric:
      type: object
      required: [trend_topic, frequency, utility, outlier_ratio, time_slice]
      properties:
        trend_topic:
          type: string
        frequency:
          type: integer
          format: int64
        utility:
          type: integer
          format: int64
        outlier_ratio:
          type: number
        time_slice:
          type: string
          format: date-time
    TrendContext:
      type: object
      required: [context, frequency]
      properties:
        context:
          type: string
        frequency:
          type: integer
          format: int64
    Lifecycle:
      type: object
      required: [time_slice, frequency, velocity]
      properties:
        time_slice:
          type: string
          format: date-time
        frequency:
          type: integer
          format: int64
        velocity:
          type: integer
          format: int64
    DomainComparison:
      type: object
      required: [classification, rank_group, trend_topic, score_a, score_b]
      properties:
        classification:
          type: string
          enum: [BLINDSPOT_A, BLINDSPOT_B, INTERSECT]
        rank_group:
          type: integer
        trend_topic:
          type: string
        score_a:
          type: number
        score_b:
          type: number
    SentimentScores:
      type: object
      required: [valence, arousal, dominance, joy, anger, sadness, fear, disgust]
      properties:
        valence:
          type: number
        arousal:
          type: number
        dominance:
          type: number
        joy:
          type: number
        anger:
          type: number
        sadness:
          type: number
        fear:
          type: number
        disgust:
          type: number
    ThinkResult:
      type: object
      properties:
        title_original:
          type: string
        description_original:
          type: string
        title_corrected:
          type: string
        title_correction_reason:
          type: string
        description_corrected:
          type: string
        description_correction_reason:
          type: string
        framing:
          type: number
        framing_reason:
          type: string
        clickbait:
          type: number
        clickbait_reason:
          type: string
        persuasive:
          type: number
        persuasive_reason:
          type: string
        hyper_stimulus:
          type: number
        hyper_stimulus_reason:
          type: string
        speculative:
          type: number
        speculative_reason:
          type: string
        overall:
          type: number
        overall_reason:
          type: string
    MediaThumbnail:
      type: object
      properties:
        url:
          type: string
        height:
          type: integer
        width:
          type: integer
    MediaContent:
      type: object
      properties:
        url:
          type: string
        type:
          type: string
        medium:
          type: string
        height:
          type: integer
        width:
          type: integer
        title:
          type: string
        description:
          type: string
        thumbnail:
          $ref: "#/components/schemas/MediaThumbnail"
        credit:
          type: string
    AnalyzedItem:
      allOf:
        - $ref: "#/components/schemas/ThinkResult"
        - type: object
          required: [hash, url, rating]
          properties:
            hash:
              type: string
            url:
              type: string
            sentiments:
              $ref: "#/components/schemas/SentimentScores"
            sentiments_deframed:
              $ref: "#/components/schemas/SentimentScores"
            media:
              $ref: "#/components/schemas/MediaContent"
            rating:
              type: number
            authors:
              type: array
              items:
                type: string
            pubDate:
              type: string
              format: date-time
    AnalyzedSiteItem:
      allOf:
        - $ref: "#/components/schemas/ThinkResult"
        - type: object
          required: [hash, url, rating]
          properties:
            hash:
              type: string
            url:
              type: string
            media:
              $ref: "#/components/schemas/MediaContent"
            rating:
              type: number
            authors:
              type: array
              items:
                type: string
            pubDate:
              type: string
              format: date-time
    AnalyzedArticle:
      type: object
      required: [url, pub_date]
      properties:
        url:
          type: string
        title:
          type: string
        rating:
          type: number
        authors:
          type: array
          items:
            type: string
        pub_date:
          type: string
          format: date-time
    SentimentItem:
      type: object
      properties:
        sentiments:
          $ref: "#/components/schemas/SentimentScores"
        sentiments_deframed:
          $ref: "#/components/schemas/SentimentScores"
