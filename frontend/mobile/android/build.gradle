buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        // AsyncStorage 3.x ships storage-android via a local Maven repo; official install docs:
        // https://github.com/react-native-async-storage/async-storage?tab=readme-ov-file#android
        maven {
            url(project(":react-native-async-storage_async-storage").file("local_repo"))
        }
        google()
        mavenCentral()
    }
}
