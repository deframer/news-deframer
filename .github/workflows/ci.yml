name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # JOB 1: Test & Security
  test:
    runs-on: ubuntu-latest
    container: debian:trixie
    env:
      PGPASSWORD: deframer
    services:
      postgres:
        image: pgduckdb/pgduckdb:18-main
        env:
          POSTGRES_USER: deframer
          POSTGRES_PASSWORD: ${{ env.PGPASSWORD }}
          POSTGRES_DB: deframer
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update && apt-get install -y git make curl bash binutils build-essential postgresql-client

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Check Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
        env:
          GOFLAGS: "-buildvcs=false"

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...
        env:
          GOTOOLCHAIN: auto

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Setup Database
        run: |
          psql -h postgres -U deframer -d deframer -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'

      - name: Run Tests
        run: |
          go test -v -count=1 -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
        env:
          CGO_ENABLED: 1
          GOFLAGS: "-buildvcs=false"
          DSN: "host=postgres user=deframer password=${{ env.PGPASSWORD }} dbname=deframer port=5432 sslmode=disable"

  frontend-browser-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Get Version from Tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Update package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd frontend/browser-extension
          # Use --allow-same-version in case the version was already updated manually
          npm version ${{ env.VERSION }} --no-git-tag-version --allow-same-version

      - name: Test, Lint and Build Browser Extension
        run: |
          cd frontend/browser-extension
          npm ci
          npm run lint
          npm run test
          npm run dist

      - name: Prepare Artifact for Tagged Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: mv frontend/browser-extension/extension.zip news-deframer-extension-${{ env.VERSION }}.zip

      - name: Upload Extension Artifact for Tagged Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: extension-artifact
          path: news-deframer-extension-${{ env.VERSION }}.zip

  frontend-mobile-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend/mobile
    env:
      MOBILE_VERSION_NAME: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.1-dev' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set mobile version metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.1-dev"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION%%-*}"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-1}
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "MOBILE_VERSION_NAME=${VERSION}" >> "$GITHUB_ENV"
          echo "MOBILE_VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        run: npm ci

      - name: Build Android APK
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            cd android && ./gradlew assembleRelease
          else
            cd android && ./gradlew assembleDebug
          fi

      - name: Prepare Android artifact name
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ARTIFACT_NAME="news-deframer-android-${MOBILE_VERSION_NAME}.apk"
            cp android/app/build/outputs/apk/release/app-release.apk "${ARTIFACT_NAME}"
          else
            ARTIFACT_NAME="news-deframer-android-debug.apk"
            cp android/app/build/outputs/apk/debug/app-debug.apk "${ARTIFACT_NAME}"
          fi
          echo "ANDROID_ARTIFACT=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: frontend/mobile/${{ env.ANDROID_ARTIFACT }}

  frontend-mobile-ios-simulator:
    runs-on: macos-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/mobile/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: frontend/mobile

      - name: Install mobile dependencies
        run: npm ci

      - name: Install iOS pods
        run: bundle exec pod install --project-directory=ios

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -workspace ios/NewsDeframerMobile.xcworkspace \
            -scheme NewsDeframerMobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-app
          path: frontend/mobile/ios/build/Build/Products/Debug-iphonesimulator

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [service, worker]
    steps:
      - uses: actions/checkout@v6

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: build/package/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REPO_URL=${{ github.server_url }}/${{ github.repository }}

  release:
    needs: [frontend-browser-extension, frontend-mobile-android, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # to create the release
    steps:
      - name: Get Version from Tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Download extension artifact
        uses: actions/download-artifact@v8
        with:
          name: extension-artifact
          path: .

      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            news-deframer-extension-${{ env.VERSION }}.zip
            news-deframer-android-${{ env.VERSION }}.apk
