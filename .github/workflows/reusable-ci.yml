name: Reusable CI

on:
  workflow_call:
    inputs:
      force_all:
        description: Run all jobs regardless of changed paths
        required: false
        default: false
        type: boolean

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      browser: ${{ steps.force-all.outputs.browser || steps.filter.outputs.browser_any_changed }}
      mobile: ${{ steps.force-all.outputs.mobile || steps.filter.outputs.mobile_any_changed }}
      server: ${{ steps.force-all.outputs.server || steps.filter.outputs.server_any_changed }}
      any: ${{ steps.force-all.outputs.any || steps.filter.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Force all areas
        id: force-all
        if: ${{ inputs.force_all }}
        shell: bash
        run: |
          echo "any=true" >> "$GITHUB_OUTPUT"
          echo "browser=true" >> "$GITHUB_OUTPUT"
          echo "mobile=true" >> "$GITHUB_OUTPUT"
          echo "server=true" >> "$GITHUB_OUTPUT"

      - name: Detect changed areas
        id: filter
        if: ${{ !inputs.force_all }}
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96
        with:
          files_yaml: |
            browser:
              - frontend/browser-extension/**
              - frontend/shared/**
            mobile:
              - frontend/mobile/**
              - frontend/shared/**
            server:
              - cmd/**
              - pkg/**
              - build/package/**
              - sql/**
              - go.mod
              - go.sum
              - Makefile
              - docker-compose.yml
              - docker-compose-lb.yml

  test:
    needs: changes
    if: ${{ inputs.force_all || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    container: debian:trixie
    env:
      PGPASSWORD: deframer
    services:
      postgres:
        image: pgduckdb/pgduckdb:18-main
        env:
          POSTGRES_USER: deframer
          POSTGRES_PASSWORD: ${{ env.PGPASSWORD }}
          POSTGRES_DB: deframer
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update && apt-get install -y git make curl bash binutils build-essential postgresql-client

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Install Goa CLI
        run: make goa-install

      - name: Check Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
        env:
          GOFLAGS: "-buildvcs=false"

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...
        env:
          GOTOOLCHAIN: auto

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Setup Database
        run: |
          psql -h postgres -U deframer -d deframer -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'

      - name: Run Tests
        run: |
          go test -v -count=1 -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
        env:
          CGO_ENABLED: 1
          GOFLAGS: "-buildvcs=false"
          DSN: "host=postgres user=deframer password=${{ env.PGPASSWORD }} dbname=deframer port=5432 sslmode=disable"

  frontend-browser-extension:
    needs: changes
    if: ${{ inputs.force_all || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.browser == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/browser-extension/package-lock.json

      - name: Get Version from Tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Update package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd frontend/browser-extension
          npm version "${{ env.VERSION }}" --no-git-tag-version --allow-same-version

      - name: Test, Lint and Build Browser Extension
        run: |
          cd frontend/browser-extension
          npm ci
          npm run lint
          npm run test
          npm run dist

      - name: Prepare Artifact for Tagged Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: mv frontend/browser-extension/extension.zip news-deframer-extension-${{ env.VERSION }}.zip

      - name: Upload Extension Artifact for Tagged Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: extension-artifact
          path: news-deframer-extension-${{ env.VERSION }}.zip
          retention-days: 1

  frontend-mobile-android:
    needs: changes
    if: ${{ inputs.force_all || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - uses: actions/checkout@v6

      - name: Validate tagged mobile release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          SOURCE_VERSION_NAME=$(sed -n 's/.*System.getenv("MOBILE_VERSION_NAME") ?: "\([^"]*\)".*/\1/p' "$BUILD_GRADLE")
          SOURCE_VERSION_CODE=$(sed -n 's/.*System.getenv("MOBILE_VERSION_CODE") ?: "\([^"]*\)".*/\1/p' "$BUILD_GRADLE")

          if [[ -z "$SOURCE_VERSION_NAME" || -z "$SOURCE_VERSION_CODE" ]]; then
            echo "Could not read MOBILE_VERSION_NAME or MOBILE_VERSION_CODE defaults from $BUILD_GRADLE"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$SOURCE_VERSION_NAME" ]]; then
            echo "Tag version '$TAG_VERSION' does not match Android source versionName '$SOURCE_VERSION_NAME'"
            exit 1
          fi

          CHANGELOG_PATH="android/app/fastlane/metadata/android/en-US/changelogs/${SOURCE_VERSION_CODE}.txt"
          if [[ ! -f "$CHANGELOG_PATH" ]]; then
            echo "Missing Android changelog for versionCode $SOURCE_VERSION_CODE: $CHANGELOG_PATH"
            exit 1
          fi

      - name: Set mobile version metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            MOBILE_VERSION_NAME="${VERSION}"
          else
            VERSION="0.0.1"
            MOBILE_VERSION_NAME="0.0.1-dev-${GITHUB_RUN_NUMBER}"
          fi
          echo "MOBILE_VERSION_NAME=${MOBILE_VERSION_NAME}" >> "$GITHUB_ENV"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION%%-*}"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-1}
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH + GITHUB_RUN_NUMBER))

          echo "MOBILE_VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install mobile dependencies
        run: npm ci

      - name: Build Android Release APK
        shell: bash
        run: cd android && ./gradlew assembleRelease

      - name: Prepare Android artifact name
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            ARTIFACT_NAME="news-deframer-android-${VERSION}.apk"
          else
            ARTIFACT_NAME="news-deframer-android-release-${GITHUB_SHA::7}.apk"
          fi
          cp android/app/build/outputs/apk/release/app-release.apk "${ARTIFACT_NAME}"
          echo "ANDROID_ARTIFACT=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: frontend/mobile/${{ env.ANDROID_ARTIFACT }}
          retention-days: 1

  frontend-mobile-ios-simulator:
    needs: changes
    if: ${{ inputs.force_all || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.mobile == 'true' }}
    runs-on: macos-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/mobile/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: frontend/mobile

      - name: Install mobile dependencies
        run: npm ci

      - name: Install iOS pods
        run: bundle exec pod install --project-directory=ios

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -workspace ios/NewsDeframerMobile.xcworkspace \
            -scheme NewsDeframerMobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-app
          path: frontend/mobile/ios/build/Build/Products/Debug-iphonesimulator
          retention-days: 1

  docker:
    needs: [changes, test]
    if: ${{ inputs.force_all || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [service, worker]
    steps:
      - uses: actions/checkout@v6

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: build/package/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REPO_URL=${{ github.server_url }}/${{ github.repository }}

  release:
    needs: [frontend-browser-extension, frontend-mobile-android, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Version from Tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Download extension artifact
        uses: actions/download-artifact@v8
        with:
          name: extension-artifact
          path: .

      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            news-deframer-extension-${{ env.VERSION }}.zip
            news-deframer-android-${{ env.VERSION }}.apk
