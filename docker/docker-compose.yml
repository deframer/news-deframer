---
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "2g"
    max-file: "1"

services:
  postgres:
    # this is postgres with the pg_duckdb extension precompiled
    # https://pgxman.com/x/pg_duckdb
    # https://github.com/duckdb/pg_duckdb
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: news-deframer-postgres:pg_cron
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deframer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deframer}
      POSTGRES_DB: ${POSTGRES_DB:-deframer}
    volumes:
      - postgres_data:/var/lib/postgresql
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deframer}"]
      interval: 5s
      timeout: 5s
      retries: 5

  service:
    image: ghcr.io/deframer/news-deframer/service:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=${PORT:-8080}
      - DSN=${DSN:-host=postgres user=deframer password=deframer dbname=deframer port=5432 sslmode=disable}
      - DATABASE_LOGGING=${DATABASE_LOGGING:-false}
      - DEBUG_LOG=${DEBUG_LOG:-false}
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-}
      - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - REDIRECT_WEBREQUEST_404_URL=${REDIRECT_WEBREQUEST_404_URL:-}
      - LLM_MODEL=${LLM_MODEL:?LLM_MODEL is required}
    logging: *default-logging
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

  ingester:
    image: ghcr.io/deframer/news-deframer/worker:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--mode", "ingester"]
    environment:
      - DSN=${DSN:-host=postgres user=deframer password=deframer dbname=deframer port=5432 sslmode=disable}
      - DATABASE_LOGGING=${DATABASE_LOGGING:-false}
      - DEBUG_LOG=${DEBUG_LOG:-false}
      - LLM_TYPE=${LLM_TYPE:-}
      - LLM_MODEL=${LLM_MODEL:?LLM_MODEL is required}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
    logging: *default-logging

  thinker:
    image: ghcr.io/deframer/news-deframer/worker:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--mode", "thinker"]
    environment:
      - DSN=${DSN:-host=postgres user=deframer password=deframer dbname=deframer port=5432 sslmode=disable}
      - DATABASE_LOGGING=${DATABASE_LOGGING:-false}
      - DEBUG_LOG=${DEBUG_LOG:-false}
      - LLM_TYPE=${LLM_TYPE:-}
      - LLM_MODEL=${LLM_MODEL:?LLM_MODEL is required}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
    logging: *default-logging

  thinker-update-llm-model:
    image: ghcr.io/deframer/news-deframer/worker:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--mode", "thinker-update-llm-model"]
    environment:
      - DSN=${DSN:-host=postgres user=deframer password=deframer dbname=deframer port=5432 sslmode=disable}
      - DATABASE_LOGGING=${DATABASE_LOGGING:-false}
      - DEBUG_LOG=${DEBUG_LOG:-false}
      - LLM_TYPE=${LLM_TYPE:-}
      - LLM_MODEL=${LLM_MODEL:?LLM_MODEL is required}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
    logging: *default-logging

  # thinker-fixer:
  #   image: ghcr.io/deframer/news-deframer/worker:latest
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   command: ["--mode", "thinker-fixer"]
  #   environment:
  #     - DSN=${DSN:-host=postgres user=deframer password=deframer dbname=deframer port=5432 sslmode=disable}
  #     - DATABASE_LOGGING=${DATABASE_LOGGING:-false}
  #     - DEBUG_LOG=${DEBUG_LOG:-false}
  #     - LLM_TYPE=${LLM_TYPE:-}
  #     - LLM_MODEL=${LLM_MODEL:-}
  #     - LLM_API_KEY=${LLM_API_KEY:-}
  #     - LLM_BASE_URL=${LLM_BASE_URL:-}
  #   logging: *default-logging

  miner:
    image: ghcr.io/deframer/news-deframer-mining/miner:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DSN=${DSN:-host=postgres user=deframer password=deframer dbname=deframer port=5432 sslmode=disable}
      - LOG_DATABASE=${DATABASE_LOGGING:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # we download the models on demand
      - SPACY_MODELS=${SPACY_MODELS:-en de da}
      - MEMOLON_MODELS=${MEMOLON_MODELS:-en de da}
    logging: *default-logging

volumes:
  postgres_data:
